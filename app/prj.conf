# Logging
CONFIG_LOG=y

# Enable components
CONFIG_LED_COMPONENT=y
CONFIG_BUTTON_COMPONENT=y
CONFIG_SYS_CTRL_COMPONENT=y

# Control individual component shell configurations
CONFIG_BUTTON_COMPONENT_SHELL=y
CONFIG_LED_COMPONENT_SHELL=y
CONFIG_SYS_CTRL_COMPONENT_SHELL=y

# Enable debug logging for each component
CONFIG_LED_COMPONENT_LOG_LEVEL_DBG=y
CONFIG_BUTTON_COMPONENT_LOG_LEVEL_DBG=y
CONFIG_SYS_CTRL_COMPONENT_LOG_LEVEL_DBG=y

# Modules for Cold Chain Monitoring Extension
CONFIG_TEMP_ALERT_COMPONENT=y
CONFIG_TEMPSENSE_COMPONENT=y
CONFIG_SENSOR_LOG_COMPONENT=y

CONFIG_TEMPSENSE_SHELL=y
CONFIG_TEMP_ALERT_SHELL=y
CONFIG_SENSOR_LOG_SHELL=y

CONFIG_TEMP_ALERT_LOG_LEVEL_DBG=y
CONFIG_TEMPSENSE_LOG_LEVEL_DBG=y
CONFIG_SENSOR_LOG_LOG_LEVEL_DBG=y

# Sensor support
CONFIG_SENSOR=y
CONFIG_I2C=y

# ZBus
CONFIG_ZBUS=y

# Shell Testing
CONFIG_SHELL=y

# GPIO Support
CONFIG_GPIO=y
