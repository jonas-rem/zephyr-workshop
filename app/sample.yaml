sample:
  description: Application
  name: app
common:
  tags: introduction
tests:
  sample.basic.app:
    tags: introduction
    integration_platforms:
      - native_sim
      - reel_board
    harness: console
    harness_config:
      type: one_line
      regex:
        - "LED module started"

  # Build tests for tracing configurations
  sample.app.tracing.native_ctf:
    build_only: true
    extra_args: EXTRA_CONF_FILE=prj_native_ctf.conf
    platform_allow:
      - native_sim
    integration_platforms:
      - native_sim
    tags: tracing

  sample.app.tracing.usb_ctf:
    build_only: true
    extra_args: EXTRA_CONF_FILE=prj_usb_ctf.conf
    platform_allow:
      - nrf52840dk/nrf52840
    integration_platforms:
      - nrf52840dk/nrf52840
    depends_on: usb_device
    tags: tracing

  sample.app.tracing.sysview_rtt:
    build_only: true
    extra_args: EXTRA_CONF_FILE=prj_sysview_rtt.conf
    platform_allow:
      - nrf52840dk/nrf52840
    integration_platforms:
      - nrf52840dk/nrf52840
    filter: CONFIG_HAS_SEGGER_RTT
    tags: tracing
