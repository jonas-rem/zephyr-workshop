sample:
  description: Application
  name: app
common:
  tags: introduction
tests:
  # Main application with all components
  basic.app:
    tags: introduction
    integration_platforms:
      - native_sim
      - reel_board
    harness: console
    harness_config:
      type: one_line
      regex:
        - "System booted"

  # Component-specific tests using Kconfig options
  # Tests each component in isolation with console harness

  app.test.button:
    extra_args: EXTRA_CONF_FILE=test_cfg/button_module.conf
    integration_platforms:
      - native_sim
      - stm32f4_disco
      - reel_board
    tags: button
    harness: console
    harness_config:
      type: one_line
      regex:
        - "Button module started"

  app.test.led:
    extra_args: EXTRA_CONF_FILE=test_cfg/led_module.conf
    integration_platforms:
      - native_sim
      - stm32f4_disco
      - reel_board
    tags: led
    harness: console
    harness_config:
      type: one_line
      regex:
        - "LED module initialized"

  app.test.sys_ctrl:
    extra_args: EXTRA_CONF_FILE=test_cfg/sys_ctrl_module.conf
    integration_platforms:
      - native_sim
    tags: sys_ctrl
    harness: console
    harness_config:
      type: one_line
      regex:
        - "System booted"

  # Build tests for tracing configurations
  app.tracing.native_ctf:
    build_only: true
    extra_args: EXTRA_CONF_FILE=prj_native_ctf.conf
    platform_allow:
      - native_sim
    integration_platforms:
      - native_sim
    tags: tracing

  app.tracing.usb_ctf:
    build_only: true
    extra_args: EXTRA_CONF_FILE=prj_usb_ctf.conf
    platform_allow:
      - nrf52840dk/nrf52840
    integration_platforms:
      - nrf52840dk/nrf52840
    depends_on: usb_device
    tags: tracing

  app.tracing.sysview_rtt:
    build_only: true
    extra_args: EXTRA_CONF_FILE=prj_sysview_rtt.conf
    platform_allow:
      - nrf52840dk/nrf52840
    integration_platforms:
      - nrf52840dk/nrf52840
    filter: CONFIG_HAS_SEGGER_RTT
    tags: tracing
