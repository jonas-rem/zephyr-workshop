CONFIG_ZTEST=y

# Enable sys_ctrl component
CONFIG_SYS_CTRL_COMPONENT=y

# Disable shell to avoid test output clutter
# CONFIG_SYS_CTRL_COMPONENT_SHELL is not set

# Enable ZBus
CONFIG_ZBUS=y
CONFIG_ZBUS_RUNTIME_OBSERVERS=y

# Disable LED component (we only test sys_ctrl in isolation)
# CONFIG_LED_COMPONENT is not set

# Logging (optional, disable for cleaner test output)
CONFIG_LOG=n
CONFIG_PRINTK=n
