CONFIG_ZTEST=y

# Enable sys_ctrl module
CONFIG_SYS_CTRL_MODULE=y

# Disable shell to avoid test output clutter
# CONFIG_SYS_CTRL_MODULE_SHELL is not set

# Enable ZBus
CONFIG_ZBUS=y
CONFIG_ZBUS_RUNTIME_OBSERVERS=y

# Disable LED module (we only test sys_ctrl in isolation)
# CONFIG_LED_MODULE is not set

# Logging (optional, disable for cleaner test output)
CONFIG_LOG=n
CONFIG_PRINTK=n
