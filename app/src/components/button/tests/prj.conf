CONFIG_ZTEST=y

# Enable button module
CONFIG_BUTTON_MODULE=y

# Disable shell to avoid test output clutter
# CONFIG_BUTTON_MODULE_SHELL is not set

# Enable ZBus
CONFIG_ZBUS=y
CONFIG_ZBUS_RUNTIME_OBSERVERS=y

# Enable GPIO emulation for native_sim
CONFIG_GPIO=y
CONFIG_GPIO_EMUL=y

# Logging (optional, disable for cleaner test output)
CONFIG_LOG=n
CONFIG_PRINTK=n
