CONFIG_ZTEST=y

# Enable sensor_log module
CONFIG_SENSOR_LOG_COMPONENT=y

# Enable ZBus
CONFIG_ZBUS=y

# Enable system workqueue for deferred publishing
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

# Enable shell for testing shell commands
CONFIG_SHELL=y
CONFIG_SENSOR_LOG_SHELL=y

# Logging (optional, disable for cleaner test output)
CONFIG_LOG=n
CONFIG_PRINTK=n
