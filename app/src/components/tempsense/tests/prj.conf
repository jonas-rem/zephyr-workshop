CONFIG_ZTEST=y

# Enable tempsense module
CONFIG_TEMPSENSE_COMPONENT=y

# Faster sampling interval for quicker test execution (100ms instead of 1000ms)
CONFIG_TEMPSENSE_SAMPLE_INTERVAL_MS=100

# Enable sensor support
CONFIG_SENSOR=y
CONFIG_I2C=y

# Enable ZBus
CONFIG_ZBUS=y

# Enable system workqueue for delayed work
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

# Logging (optional, disable for cleaner test output)
CONFIG_LOG=n
CONFIG_PRINTK=n
