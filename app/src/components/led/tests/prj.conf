CONFIG_ZTEST=y

# Enable LED component
CONFIG_LED_COMPONENT=y

# Disable shell to avoid test output clutter
# CONFIG_LED_COMPONENT_SHELL is not set

# Enable ZBus
CONFIG_ZBUS=y

# Enable GPIO emulation for native_sim
CONFIG_GPIO=y
CONFIG_GPIO_EMUL=y

# Logging (optional, disable for cleaner test output)
CONFIG_LOG=n
CONFIG_PRINTK=n
