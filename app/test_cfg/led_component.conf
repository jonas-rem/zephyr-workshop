# LED component test configuration
# Only LED component enabled to test isolated functionality

# Logging
CONFIG_LOG=y
CONFIG_LOG_PROCESS_TRIGGER_THRESHOLD=1
CONFIG_LED_COMPONENT_LOG_LEVEL_DBG=y

# Enable only LED component
CONFIG_LED_COMPONENT=y
CONFIG_SYS_CTRL_COMPONENT=n
CONFIG_BUTTON_COMPONENT=n
CONFIG_BUTTON_MOCK_COMPONENT=n

# ZBus for LED control
CONFIG_ZBUS=y

# Enable LED component shell commands
CONFIG_LED_COMPONENT_SHELL=y

# GPIO for LED control
CONFIG_GPIO=y
