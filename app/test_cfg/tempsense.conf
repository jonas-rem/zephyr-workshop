# Temperature Sensor component test configuration
# Only tempsense component enabled for isolated testing

# Logging
CONFIG_LOG=y
CONFIG_TEMPSENSE_LOG_LEVEL_DBG=y

# Enable only tempsense component
CONFIG_TEMPSENSE_COMPONENT=y
CONFIG_TEMPSENSE_SHELL=y
CONFIG_LED_COMPONENT=n
CONFIG_BUTTON_COMPONENT=n
CONFIG_SYS_CTRL_COMPONENT=n
CONFIG_BUTTON_MOCK_COMPONENT=n
CONFIG_TEMP_ALERT_COMPONENT=n
CONFIG_SENSOR_LOG_COMPONENT=n

# Sensor support
CONFIG_SENSOR=y
CONFIG_I2C=y

# ZBus for event handling
CONFIG_ZBUS=y

# Shell for manual interaction
CONFIG_SHELL=y
CONFIG_SHELL_PROMPT_UART="uart:~$ "
CONFIG_LOG_RUNTIME_FILTERING=n
CONFIG_SHELL_LOG_BACKEND=n
