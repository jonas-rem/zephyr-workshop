# Sensor Log component test configuration
# Only sensor_log component enabled for isolated testing

# Logging
CONFIG_LOG=y
CONFIG_SENSOR_LOG_LOG_LEVEL_DBG=y

# Enable only sensor_log component
CONFIG_SENSOR_LOG_COMPONENT=y
CONFIG_LED_COMPONENT=n
CONFIG_BUTTON_COMPONENT=n
CONFIG_SYS_CTRL_COMPONENT=n
CONFIG_BUTTON_MOCK_COMPONENT=n
CONFIG_TEMP_ALERT_COMPONENT=n

# Enable shell for manual testing of commands
CONFIG_SHELL=y
CONFIG_SENSOR_LOG_SHELL=y

# ZBus for event handling
CONFIG_ZBUS=y

# Shell Testing
CONFIG_SHELL_PROMPT_UART="uart:~$ "
# CONFIG_SHELL implies LOG_RUNTIME_FILTERING, breaking per-module log levels
CONFIG_LOG_RUNTIME_FILTERING=n
CONFIG_SHELL_LOG_BACKEND=n
