# Button component test configuration
# Only button component enabled to test isolated functionality

# Logging
CONFIG_LOG=y
CONFIG_LOG_PROCESS_TRIGGER_THRESHOLD=1
CONFIG_BUTTON_COMPONENT_LOG_LEVEL_DBG=y

# Enable only button component
CONFIG_BUTTON_COMPONENT=y
CONFIG_LED_COMPONENT=n
CONFIG_SYS_CTRL_COMPONENT=n
CONFIG_TEMPSENSE_COMPONENT=n
CONFIG_TEMP_ALERT_COMPONENT=n

# ZBus for button events
CONFIG_ZBUS=y

# GPIO for button input
CONFIG_GPIO=y

# Enable button component shell commands
CONFIG_BUTTON_COMPONENT_SHELL=y
