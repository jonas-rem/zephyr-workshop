# Button module test configuration
# Only button module enabled to test isolated functionality

# Logging
CONFIG_LOG=y
CONFIG_LOG_PROCESS_TRIGGER_THRESHOLD=1
CONFIG_BUTTON_MODULE_LOG_LEVEL_DBG=y

# Enable only button module
CONFIG_BUTTON_MODULE=y
CONFIG_LED_MODULE=n
CONFIG_SYS_CTRL_MODULE=n

# ZBus for button events
CONFIG_ZBUS=y

# GPIO for button input
CONFIG_GPIO=y

# Enable button module shell commands
CONFIG_BUTTON_MODULE_SHELL=y
