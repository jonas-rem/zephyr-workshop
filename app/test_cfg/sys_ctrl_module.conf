# System Controller module test configuration
# Only sys_ctrl module enabled for testing with shell commands

# Enable only sys_ctrl module
CONFIG_SYS_CTRL_MODULE=y
CONFIG_LED_MODULE=n
CONFIG_BUTTON_MODULE=n
CONFIG_BUTTON_MOCK=n

# ZBus for state management
CONFIG_ZBUS=y

# Logging
CONFIG_LOG=y
CONFIG_LOG_PROCESS_TRIGGER_THRESHOLD=1
CONFIG_SYS_CTRL_MODULE_LOG_LEVEL_DBG=y

# Enable sys_ctrl module shell commands
CONFIG_SYS_CTRL_MODULE_SHELL=y
