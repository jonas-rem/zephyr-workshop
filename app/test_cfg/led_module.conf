# LED module test configuration
# Only LED module enabled to test isolated functionality

# Logging
CONFIG_LOG=y
CONFIG_LOG_PROCESS_TRIGGER_THRESHOLD=1
CONFIG_LED_MODULE_LOG_LEVEL_DBG=y

# Enable only LED module
CONFIG_LED_MODULE=y
CONFIG_SYS_CTRL_MODULE=n
CONFIG_BUTTON_MODULE=n
CONFIG_BUTTON_MOCK=n

# ZBus for LED control
CONFIG_ZBUS=y

# Enable LED module shell commands
CONFIG_LED_MODULE_SHELL=y

# GPIO for LED control
CONFIG_GPIO=y
