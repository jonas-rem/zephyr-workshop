# Temperature Alert component test configuration
# Only temp_alert component enabled for isolated testing

# Logging
CONFIG_LOG=y
CONFIG_TEMP_ALERT_LOG_LEVEL_DBG=y

# Enable only temp_alert component
CONFIG_TEMP_ALERT_COMPONENT=y
CONFIG_LED_COMPONENT=n
CONFIG_BUTTON_COMPONENT=n
CONFIG_SYS_CTRL_COMPONENT=n
CONFIG_BUTTON_MOCK_COMPONENT=n

# ZBus for event handling
CONFIG_ZBUS=y
